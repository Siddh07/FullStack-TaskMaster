<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | All-in-One Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Layout Structure */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - Hidden on Mobile */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar nav {
            flex: 1;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sidebar nav a.active, .sidebar nav a:hover {
            background: #eff6ff;
            color: var(--accent);
        }

        /* Mobile Nav - Visible only on Small Screens */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--border);
            padding: 0.75rem;
            justify-content: space-around;
            z-index: 100;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .stat-card span { color: var(--text-secondary); font-size: 0.875rem; }
        .stat-card h2 { font-size: 1.75rem; margin-top: 0.25rem; }

        /* Kanban Board */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            align-items: start;
        }

        .column {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 12px;
            min-height: 500px;
        }

        .column h3 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
        }

        .task-card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            cursor: grab;
        }

        .task-card p { font-weight: 500; margin-bottom: 0.75rem; font-size: 0.95rem; }

        .badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .high { background: #fee2e2; color: #dc2626; }
        .med { background: #fef3c7; color: #d97706; }
        .low { background: #dcfce7; color: #16a34a; }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .board { grid-template-columns: 1fr 1fr; }
            .column:last-child { grid-column: span 2; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-content { padding: 1.5rem 1rem 5rem 1rem; }
            .board { grid-template-columns: 1fr; }
            .column:last-child { grid-column: span 1; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                TaskFlow
            </div>
            <nav>
                <a href="#" class="active">Dashboard</a>
                <a href="#">My Tasks</a>
                <a href="#">Projects</a>
                <a href="#">Calendar</a>
                <a href="#">Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Dashboard</h1>
                <button class="btn-primary" id="addTaskBtn">+ Add Task</button>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <span>Active Tasks</span>
                    <h2 id="total-tasks">12</h2>
                </div>
                <div class="stat-card">
                    <span>Completed</span>
                    <h2>48</h2>
                </div>
            </section>

            <section class="board">
                <div class="column" id="todo-col">
                    <h3>To Do <span class="count">2</span></h3>
                    <div class="task-card" draggable="true">
                        <span class="badge high">High</span>
                        <p>Optimize database queries</p>
                        <small style="color: var(--text-secondary)">Updated 2h ago</small>
                    </div>
                    <div class="task-card" draggable="true">
                        <span class="badge med">Medium</span>
                        <p>User feedback session</p>
                        <small style="color: var(--text-secondary)">Updated 5h ago</small>
                    </div>
                </div>

                <div class="column" id="progress-col">
                    <h3>In Progress <span class="count">1</span></h3>
                    <div class="task-card" draggable="true">
                        <span class="badge low">Low</span>
                        <p>Refresh iconography set</p>
                        <small style="color: var(--text-secondary)">Updated 1d ago</small>
                    </div>
                </div>

                <div class="column" id="done-col">
                    <h3>Done <span class="count">0</span></h3>
                </div>
            </section>
        </main>

        <nav class="mobile-nav">
            <a href="#" style="color: var(--accent)">Home</a>
            <a href="#" style="color: var(--text-secondary)">Tasks</a>
            <a href="#" style="color: var(--text-secondary)">Settings</a>
        </nav>
    </div>

    <script>
        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const title = prompt("Enter Task Title:");
            if (title) {
                const todoCol = document.getElementById('todo-col');
                const task = document.createElement('div');
                task.className = 'task-card';
                task.draggable = true;
                task.innerHTML = `
                    <span class="badge low">Low</span>
                    <p>${title}</p>
                    <small style="color: var(--text-secondary)">Just now</small>
                `;
                todoCol.appendChild(task);
                updateCounts();
            }
        });

        function updateCounts() {
            const cols = document.querySelectorAll('.column');
            cols.forEach(col => {
                const count = col.querySelectorAll('.task-card').length;
                col.querySelector('.count').innerText = count;
            });
        }

        // Initialize counts on load
        updateCounts();
    </script>
</body>
</html>
